name: OptikLink 每日自动登录

on:
  schedule:
    # 每天 UTC 01:00 运行（北京时间 09:00）
    - cron: "0 1 * * *"
  workflow_dispatch:   # 允许手动触发，方便测试

jobs:
  auto-login:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests

      - name: 执行自动登录脚本
        env:
          DISCORD_TOKEN:        ${{ secrets.DISCORD_TOKEN }}
          WXPUSHER_TOKEN:       ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID:         ${{ secrets.WXPUSHER_UID }}
          # 可选：在 Secrets 中维护以下两项，便于 client_id 变更后免改代码
          DISCORD_CLIENT_ID:    ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_REDIRECT_URI: ${{ secrets.DISCORD_REDIRECT_URI }}
          # 可选：在 Secrets 中维护到期日，续期后只需更新 Secret
          EXPIRE_DATE:          ${{ secrets.EXPIRE_DATE }}
        run: python optiklink_login.py

  # ── 日志保留：仅保留最新 2 条 workflow run，其余自动删除 ──────────
  cleanup-old-runs:
    runs-on: ubuntu-latest
    needs: auto-login
    if: always()   # 即使登录步骤失败也执行清理
    permissions:
      actions: write   # 需要删除 workflow run 的权限

    steps:
      - name: 删除多余的 workflow run（保留最新 2 条）
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP = 2;
            const workflowName = "OptikLink 每日自动登录";

            // 获取本 workflow 的 workflow_id
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const wf = workflows.data.workflows.find(w => w.name === workflowName);
            if (!wf) {
              console.log("未找到 workflow，跳过清理");
              return;
            }

            // 列出所有 run（按创建时间降序）
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                workflow_id: wf.id,
                per_page:    100,
              }
            );

            const toDelete = runs.slice(KEEP);   // 保留前 KEEP 条，删除其余
            console.log(`共 ${runs.length} 条 run，保留 ${KEEP} 条，删除 ${toDelete.length} 条`);

            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                run_id: run.id,
              });
              console.log(`已删除 run #${run.run_number} (id=${run.id})`);
            }
